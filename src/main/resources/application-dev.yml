# druid数据源配置
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: jdbc:mysql://127.0.0.1:3306/xd11cc_single?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
        username: root
        password: xd11cc@1216
#        password: root
      slave:
        enable: false
        url:
        username:
        password:
      # 初始连接数
      initial-size: 5
      # 最小连接池数量
      min-idle: 10
      # 最大连接池数量
      max-active: 20
      # 配置获取连接等待超时的时间
      max-wait: 60000
      # 配置连接超时时间
      connect-timeout: 30000
      # 配置网络超时时间
      socket-timeout: 60000
      # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
      time-between-eviction-runs-millis: 60000
      # 配置一个连接在池中最小生存的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      # 配置一个连接在池中最大生存的时间，单位是毫秒
      max-evictable-idle-time-millis: 900000
      # 配置检测连接是否有效
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        # 设置白名单，不填则允许所有访问
        allow:
        url-pattern: /druid/*
        # 控制台管理用户名和密码
        login-username: xd11cc
        login-password: xd11cc@1216
      filter:
        stat:
          enabled: true
          # 慢SQL记录
          log-slow-sql: true
          slow-sql-millis: 2000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: true

  # redis配置
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
#    password:
    password: xd11cc@1216
    # 连接超时时间
    connect-timeout: 10s
    lettuce:
      pool:
        # 连接池中最小空闲连接
        min-idle: 0
        # 连接池中最大空闲连接
        max-idle: 8
        # 连接池的最大数据库连接
        max-active: 8
        # 连接池的最大阻塞等待时间（负值代表没有限制）
        max-wait: -1ms
  # rabbitmq配置
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: xd11cc@1216
    virtual-host: / # 默认虚拟主机
    publisher-confirm-type: correlated # 生产者确认配置（确保消息发送到交换机）
    publisher-returns: true # 生产者回调配置（确保消息路由到队列）
    # 消费者配置（手动确认消息，避免消息丢失）
    listener:
      simple:
        acknowledge-mode: manual # 手动ACK
        concurrency: 1 # 消费者并发数
        max-concurrency: 5 # 最大并发数
# rabbitmq自定义队列、交换机、路由键配置
rabbitmq:
  queue:
    direct-queue: dev_direct_queue # Direct队列名
    topic-queue1: dev_topic_queue1 # Topic1队列1
    topic-queue2: dev_topic_queue2 # Topic2队列2
    fanout-queue1: dev_fanout_queue1 # Fanout队列1
    fanout-queue2: dev_fanout_queue2 # Fanout队列2
  exchange:
    direct-exchange: dev_direct_exchange # Direct交换机
    topic-exchange: dev_topic_exchange # Topic交换机
    fanout-exchange: dev_fanout_exchange # Fanout交换机
  routing-key:
    direct-key: dev_direct_key # Direct路由键
    topic-key1: dev_topic_key1 # Topic路由键1
    topic-key2: dev_topic_key2 # Topic路由键2

# xxl-job配置
xxl:
  job:
    executor:
      app-name: ${spring.application.name}
      log-path: src/${spring.application.name}/xxl-job
      log-retention-days: 30
    admin:
      addresses: https://xd11cc.xyz/xxl-job-admin
    access-token: default_token

# minio配置
minio:
  endpoint: http://localhost:9002
  accessKey: admin
  secretKey: xd11cc@1216
  bucketName: xd11cc-bucket
  connectTimeout: 30000
  writeTimeout: 3600000
  readTimeout: 3600000

# auth页面配置
auth:
  redirect:
    successUrl: http://localhost:20001/xd11cc/dashboard?token=%s
    bindUserUrl: http://localhost:20001/xd11cc/login?source=%s&state=%s&need-bind